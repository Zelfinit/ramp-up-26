services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
      timeout: 3s
  publisher:
    build:
      context: .
      dockerfile: Dockerfile.publisher
    ports:
      - "8000:8000"
    depends_on:
        redis:
          condition: service_healthy
  subscriber:
    build: 
      context: .
      dockerfile: Dockerfile.subscriber
    depends_on:
        redis:
          condition: service_healthy
